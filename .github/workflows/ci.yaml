---
name: Java CI

on:
  push:
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#example-excluding-paths
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        java: [ 8, 11, 17, 21 ]
      fail-fast: false
      max-parallel: 16
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'
      - name: Build with Maven if test jdk8
        if: ${{ matrix.java == '8' || matrix.java == '11'}}
        #run: ./mvnw -Pgen-javadoc clean package -B
        run: ./mvnw clean package -B -DskipTests
      - name: Build with Maven if test jdk17
        if: ${{ matrix.java == '17' || matrix.java == '21' }}
        run: ./mvnw -Penable-for-jdk17+,gen-code-cov clean package -B -DskipTests
      - name: "Codecov if test jdk17"
        if: ${{ matrix.java == '17' }}
        uses: codecov/codecov-action@v3.1.0
        with:
          files: ./core/target/site/jacoco/jacoco.xml,./druid-spring-boot-starter/target/site/jacoco/jacoco.xml,./druid-spring-boot-3-starter/target/site/jacoco/jacoco.xml
      - name: Archive artifacts for jar
        if: ${{ matrix.java == '8' }}
        uses: actions/upload-artifact@v4
        with:
            name: druid
            retention-days: 7 # 保留期 
            compression-level: 9 # 压缩级别
            path: |
              ./druid-spring-boot-starter/target/*.jar
              ./core/target/*.jar
