---
name: Java CI

on:
  push:
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#example-excluding-paths
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        java: [ 8 ]
        # java: [ 8, 11, 17, 21 ]
      fail-fast: false
      max-parallel: 16
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}

    steps:
      - name: Pre install
        id: get
        run: |
          set -eux
          # 首先更新索引（带重试/修复）
          sudo apt-get clean
          sudo apt-get update -o Acquire::Retries=5 || sudo apt-get update --fix-missing
          # 如仍失败，切到官方镜像再更新
          if ! sudo apt-get update; then
            sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' /etc/apt/sources.list
            sudo sed -i 's|http://security.ubuntu.com|https://security.ubuntu.com|g' /etc/apt/sources.list
            sudo apt-get update -o Acquire::Retries=5
          fi

          # 安装所需包(systemd 已有，可不装）
          sudo apt-get install -y --no-install-recommends language-pack-zh-hans language-pack-zh-hans-base locales tree
          
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'
      - name: Build with Maven if test jdk8
        if: ${{ matrix.java == '8' || matrix.java == '11'}}
        #run: ./mvnw -Pgen-javadoc clean package -B
        run: |
          sudo locale-gen zh_CN.UTF-8 || true
          sudo /usr/bin/localectl set-locale LANG=zh_CN.UTF-8 || true 
          sudo /usr/bin/timedatectl set-timezone Asia/Shanghai || true 
          sudo /usr/bin/timedatectl set-ntp true || true
          date
          export TZ=Asia/Shanghai
          export MAVEN_OPTS="-Duser.timezone=Asia/Shanghai"
          ./mvnw clean package -B -DskipTests
      - name: Build with Maven if test jdk17
        if: ${{ matrix.java == '17' || matrix.java == '21' }}
        run: ./mvnw -Penable-for-jdk17+,gen-code-cov clean package -B -DskipTests
      - name: "Codecov if test jdk17"
        if: ${{ matrix.java == '17' }}
        uses: codecov/codecov-action@v3.1.0
        with:
          files: ./core/target/site/jacoco/jacoco.xml,./druid-spring-boot-starter/target/site/jacoco/jacoco.xml,./druid-spring-boot-3-starter/target/site/jacoco/jacoco.xml
      - name: Archive artifacts for jar
        if: ${{ matrix.java == '8' }}
        uses: actions/upload-artifact@v4
        with:
            name: druid
            retention-days: 7 # 保留期 
            compression-level: 9 # 压缩级别
            path: |
              ./druid-spring-boot-starter/target/*.jar
              ./core/target/*.jar
# /home/runner/work/druid/druid/core/target/druid-1.2.29-SNAPSHOT.jar
